<script>
// Sincronizar clase has-tabs en body según si hay pestañas visibles
const _tabObs = new MutationObserver(() => {
  const bar = document.getElementById('tab-bar');
  document.body.classList.toggle('has-tabs', bar && bar.style.display !== 'none' && bar.children.length > 0);
});
document.addEventListener('DOMContentLoaded', () => {
  const bar = document.getElementById('tab-bar');
  if (bar) _tabObs.observe(bar, {childList:true, attributes:true, attributeFilter:['style']});
  document.getElementById('btn-config')?.addEventListener('click', e => { e.stopPropagation(); toggleConfigPanel(); });
});
</script>
